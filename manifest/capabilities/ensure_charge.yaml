name: ensure_charge
description: Ensure an immediate Pix charge (cob) exists. POST /v2/cob or PUT /v2/cob/{txid} when caller-supplied — idempotent by txid.
category: capability
resource_types: [charge]
idempotent: true
input_schema:
  required: [valor, chave]
  properties:
    valor:
      type: object
      properties:
        original:
          type: string
    chave:
      type: string
    txid:
      type: string
    expiracao:
      type: integer
      default: 3600
output_schema:
  properties:
    txid: {type: string}
    location: {type: string}
    pixCopiaECola: {type: string}
    status: {type: string}
    created_at: {type: string}
