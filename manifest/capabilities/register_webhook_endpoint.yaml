name: register_webhook_endpoint
description: Register a Pix webhook URL. PUT /v2/webhook/{chave} with /v3/gn/webhook/{chave} fallback on 404.
category: capability
resource_types: [webhook]
idempotent: true
input_schema:
  required: [chave, webhook_url]
  properties:
    chave: {type: string}
    webhook_url: {type: string}
    skip_mtls_validation:
      type: boolean
      default: false
output_schema:
  properties:
    registered: {type: boolean}
    chave: {type: string}
    endpoint: {type: string}
