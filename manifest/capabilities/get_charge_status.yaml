name: get_charge_status
description: Fetch the status + pix[] for a charge. GET /v2/cob/{txid}.
category: capability
resource_types: [charge]
idempotent: true
input_schema:
  required: [txid]
  properties:
    txid:
      type: string
output_schema:
  properties:
    txid: {type: string}
    status: {type: string}
    pix:
      type: array
      items:
        type: object
        properties:
          endToEndId: {type: string}
          valor: {type: string}
          horario: {type: string}
