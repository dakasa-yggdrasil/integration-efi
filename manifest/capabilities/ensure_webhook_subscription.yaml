name: ensure_webhook_subscription
description: Ensure a Pix webhook subscription exists. PUT /v2/webhook/{chave} with /v3/gn/webhook/{chave} fallback on 404. Idempotent — repeat calls reconcile URL/headers without creating duplicates.
category: capability
resource_types: [webhook_subscription]
idempotent: true
input_schema:
  required: [chave, webhook_url]
  properties:
    chave: {type: string}
    webhook_url: {type: string}
    skip_mtls_validation:
      type: boolean
      default: false
output_schema:
  properties:
    ensured: {type: boolean}
    chave: {type: string}
    endpoint: {type: string}
