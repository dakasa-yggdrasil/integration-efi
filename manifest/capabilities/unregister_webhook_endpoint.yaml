name: unregister_webhook_endpoint
description: Unregister a Pix webhook URL. DELETE /v2/webhook/{chave}. 404 treated as success.
category: capability
resource_types: [webhook]
idempotent: true
input_schema:
  required: [chave]
  properties:
    chave: {type: string}
output_schema:
  properties:
    unregistered: {type: boolean}
    chave: {type: string}
    already_absent: {type: boolean}
