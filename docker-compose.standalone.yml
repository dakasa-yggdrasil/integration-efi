services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"

  integration-efi:
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "${HEALTHCHECK_PORT:-8080}:${HEALTHCHECK_PORT:-8080}"
      - "${ADAPTER_PORT:-8081}:${ADAPTER_PORT:-8081}"
      - "${EFI_WEBHOOK_PORT:-9079}:${EFI_WEBHOOK_PORT:-9079}"
